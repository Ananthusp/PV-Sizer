<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar Engineering Toolkit</title>
<style>
  :root{
    --ink:#15221f; --ink-soft:#4c5a56;
    --paper:#f5f6f4; --line:#dde3df;
    --brand:#0b5c46; --brand-deep:#083f30;
    --sun:#f2a20c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--paper);color:var(--ink);display:flex;flex-direction:column;overflow:hidden}

  /* ---------- Top bar with burger ---------- */
  .topbar{
    flex:none;display:flex;align-items:center;gap:12px;
    background:var(--brand-deep);color:#fff;padding:12px 16px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:100;
  }
  .burger{
    border:none;background:none;color:#fff;cursor:pointer;
    display:flex;flex-direction:column;gap:5px;padding:6px 4px;
  }
  .burger span{display:block;width:22px;height:2.5px;background:#fff;border-radius:2px;transition:.25s}
  .burger.open span:nth-child(1){transform:translateY(7.5px) rotate(45deg)}
  .burger.open span:nth-child(2){opacity:0}
  .burger.open span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg)}
  .topbar .t-title{font-size:.95rem;font-weight:700}

  /* ---------- Drawer menu ---------- */
  .drawer{
    position:fixed;top:0;bottom:0;left:0;width:270px;max-width:85vw;
    background:var(--brand-deep);color:#fff;z-index:120;
    transform:translateX(-100%);transition:transform .25s ease;
    display:flex;flex-direction:column;
  }
  .drawer.open{transform:translateX(0)}
  .d-head{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.12)}
  .d-head h1{font-size:.95rem;font-weight:800}
  .d-head span{display:block;font-size:.68rem;opacity:.6;margin-top:3px}
  .drawer nav{flex:1;overflow-y:auto;padding:12px 10px}
  .nav-item{
    display:block;width:100%;text-align:left;padding:12px 14px;
    border:none;border-radius:10px;background:none;color:#fff;
    font-size:.9rem;font-weight:600;cursor:pointer;opacity:.85;
    margin-bottom:2px;font-family:inherit;
  }
  .nav-item:hover{background:rgba(255,255,255,.08);opacity:1}
  .nav-item.on{background:var(--brand);opacity:1;box-shadow:inset 3px 0 0 var(--sun)}
  .d-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.12);font-size:.66rem;opacity:.5}

  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:110;opacity:0;pointer-events:none;transition:opacity .25s}
  .scrim.show{opacity:1;pointer-events:auto}

  /* ---------- Stage / views ---------- */
  .stage{flex:1;position:relative;min-height:0}
  .view{position:absolute;inset:0;display:none}
  .view.on{display:block}
  iframe{width:100%;height:100%;border:none;background:var(--paper)}

  /* ---------- Home: under construction ---------- */
  #view-home{display:none;align-items:center;justify-content:center;text-align:center;padding:24px}
  #view-home.on{display:flex}
  .uc{max-width:420px}
  .uc .mark{
    width:64px;height:64px;margin:0 auto 18px;border-radius:16px;
    background:var(--sun);display:flex;align-items:center;justify-content:center;
  }
  .uc .mark svg{width:34px;height:34px}
  .uc h2{font-size:1.35rem;font-weight:800;margin-bottom:8px}
  .uc p{font-size:.9rem;color:var(--ink-soft);line-height:1.55}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <button class="burger" id="burger" onclick="toggleMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div class="t-title" id="topTitle">Home</div>
</div>

<!-- Slide-out menu -->
<div class="drawer" id="drawer">
  <div class="d-head">
    <h1>Solar Toolkit</h1>
    <span>Engineering Tools</span>
  </div>
  <nav id="nav">
    <button class="nav-item on" data-id="home" onclick="show('home')">Home</button>
    <!-- Tool buttons generated from the TOOLS list below -->
  </nav>
  <div class="d-foot">© 2026 · Solar Engineering</div>
</div>
<div class="scrim" id="scrim" onclick="toggleMenu(false)"></div>

<!-- Main area -->
<div class="stage" id="stage">
  <div class="view on" id="view-home">
    <div class="uc">
      <div class="mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#083f30" stroke-width="2.2" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9L17 7M7 17l-2.1 2.1"/>
        </svg>
      </div>
      <h2>Website Under Construction</h2>
      <p>Open the menu (☰ top left) to use the available tools. More features are on the way.</p>
    </div>
  </div>
</div>

<script>
/* =========================================================
   ADD NEW TOOLS HERE — one line per tool.
   id    : short unique name (no spaces)
   title : name shown in the menu
   src   : path to the HTML file
   ========================================================= */
const TOOLS = [
  { id:"survey", title:"Solar Site Survey",   src:"tools/site-survey.html" },
  { id:"pv",     title:"PV Design Assistant", src:"tools/pv-design.html" },
  // { id:"newtool", title:"My Next Tool", src:"tools/my-next-tool.html" },
];

const nav = document.getElementById('nav');
const stage = document.getElementById('stage');

TOOLS.forEach(t=>{
  const b = document.createElement('button');
  b.className = 'nav-item'; b.dataset.id = t.id;
  b.textContent = t.title;
  b.onclick = ()=>show(t.id);
  nav.appendChild(b);

  const v = document.createElement('div');
  v.className = 'view'; v.id = 'view-' + t.id;
  v.innerHTML = `<iframe data-src="${t.src}" title="${t.title}"></iframe>`;
  stage.appendChild(v);
});

function show(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('on', v.id === 'view-'+id));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('on', b.dataset.id === id));
  const t = TOOLS.find(t=>t.id===id);
  document.getElementById('topTitle').textContent = t ? t.title : 'Home';
  if(t){
    const f = document.querySelector('#view-'+id+' iframe');
    if(!f.src) f.src = f.dataset.src;   // load only on first open
  }
  toggleMenu(false);
  if(location.hash !== '#'+id) history.replaceState(null,'','#'+id);
}

function toggleMenu(force){
  const open = force !== undefined ? force : !document.getElementById('drawer').classList.contains('open');
  document.getElementById('drawer').classList.toggle('open', open);
  document.getElementById('scrim').classList.toggle('show', open);
  document.getElementById('burger').classList.toggle('open', open);
}

/* direct link support, e.g. yoursite/#survey */
const start = location.hash.replace('#','');
if(start && (start==='home' || TOOLS.some(t=>t.id===start))) show(start);
</script>
</body>
</html>
